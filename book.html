<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Booking – CamRent</title>
  <link rel="stylesheet" href="cam.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Booking Page</h1>
      <p>Choose rental duration and review cost</p>
    </header>

    <main>
      <section id="booking" class="section">
        <h2 id="item"></h2>
        <p>Price per day: $<span id="price"></span></p>
        <label>Days: <input type="number" id="days" min="1" value="1"></label>
        <p>Total: $<span id="total"></span></p>
        <button onclick="goToCheckout()">Proceed to Checkout</button>
      </section>
    </main>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const item = params.get("item");
    const price = parseInt(params.get("price")) || 0;

    document.getElementById("item").textContent = item;
    document.getElementById("price").textContent = price;
    document.getElementById("total").textContent = price;

    document.getElementById("days").addEventListener("input", function() {
      const days = parseInt(this.value) || 1;
      document.getElementById("total").textContent = days * price;
    });

    function goToCheckout() {
      const days = document.getElementById("days").value;
      const total = document.getElementById("total").textContent;
      window.location.href = `checkout.html?item=${encodeURIComponent(item)}&price=${price}&days=${days}&total=${total}`;
    }
  </script>
</body>
</html>
